services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      RUN_MIGRATIONS: "true"
    volumes:
      - shop_database:/var/www/html/database
      - shop_storage:/var/www/html/storage
    restart: unless-stopped

volumes:
  shop_database:
  shop_storage:
