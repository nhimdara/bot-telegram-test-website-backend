services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:5000"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      PORT: "5000"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-telegram_shop}
      DB_USERNAME: ${DB_USERNAME:-telegram_shop}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_SSLMODE: disable
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - shop_storage:/var/www/html/storage
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-telegram_shop}
      POSTGRES_USER: ${DB_USERNAME:-telegram_shop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-telegram_shop} -d ${DB_DATABASE:-telegram_shop}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:9
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me}
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  shop_storage:
